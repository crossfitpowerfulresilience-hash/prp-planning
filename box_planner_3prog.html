function tvShowHUD(){
  const isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  /* Flèches toujours dispo en TV mode (fs et non-fs) */
  const ids=['tv-arr-prev','tv-arr-next'];
  const sess=(allSessions[TV.prog]||{})[TV.dayKey||todayKey()];
  if(TV.prog==='pt'&&(sess?.clients||[]).length>1) ids.push('tv-arr-up','tv-arr-down');
  /* tv-exit-btn et tv-bar-center uniquement en fullscreen */
  if(isFs){ ids.push('tv-exit-btn','tv-bar-center'); }
  ids.forEach(id=>{const el=document.getElementById(id);if(el) el.classList.add('tv-hud-visible');});
  clearTimeout(TV.hudTimer);
  TV.hudTimer=setTimeout(()=>{ ['tv-arr-prev','tv-arr-next','tv-arr-up','tv-arr-down','tv-exit-btn','tv-bar-center'].forEach(id=>{const el=document.getElementById(id);if(el) el.classList.remove('tv-hud-visible');}); },3000);
}

function tvInitActivity(){
  const overlay=document.getElementById('tv-overlay');
  const onFSChange=()=>{
    const isFs=document.fullscreenElement===overlay||document.webkitFullscreenElement===overlay;
    const btn=document.getElementById('tv-fs-btn');
    if(btn) btn.textContent=isFs?'✕':'⛶ Plein écran';
    if(isFs){ tvShowHUD(); setTimeout(tvFitFont,200); setTimeout(tvFitFont,500); }
    else { ['tv-arr-prev','tv-arr-next','tv-arr-up','tv-arr-down','tv-exit-btn','tv-bar-center'].forEach(id=>{const el=document.getElementById(id);if(el) el.classList.remove('tv-hud-visible');}); setTimeout(tvFitFont,150); }
  };
  overlay.addEventListener('fullscreenchange',onFSChange);
  overlay.addEventListener('webkitfullscreenchange',onFSChange);
  ['mousemove','mousedown','touchstart'].forEach(e=>overlay.addEventListener(e,tvShowHUD,{passive:true}));
  overlay.addEventListener('keydown',e=>{ tvShowHUD(); const isFs=!!(document.fullscreenElement||document.webkitFullscreenElement); if(!isFs) return; if(e.key==='ArrowLeft') tvShift(-1); if(e.key==='ArrowRight') tvShift(1); if(e.key==='Escape') tvToggleFS(); if(TV.prog==='pt'){if(e.key==='ArrowUp') tvPTShift(-1); if(e.key==='ArrowDown') tvPTShift(1);} });
  overlay.setAttribute('tabindex','0');
}

function tvStartClock(){
  clearInterval(TV.clockTimer);
  const tick=()=>{const el=document.getElementById('tv-clock');if(el) el.textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});};
  tick(); TV.clockTimer=setInterval(tick,1000);
}

function applyTVFont(fontId){
  if(fontId) TV.fontId=fontId;
  const font=(TV_FONTS.find(f=>f.id===TV.fontId)||TV_FONTS[0]);
  document.querySelectorAll('.tv-outer,.tv-body,#tv-overlay').forEach(el=>el.style.fontFamily=font.family);
}

let _tvLastSz = 20; /* cache de la dernière taille trouvée */

function tvFitFont(){
  const overlay = document.getElementById('tv-overlay');
  if(!overlay) return;
  const blocks = Array.from(overlay.querySelectorAll('.tv-block'));
  if(!blocks.length) return;
  requestAnimationFrame(() => {

    /* Appliquer une taille sans forcer de reflow */
    const applySize = sz => {
      blocks.forEach(b => {
        b.querySelectorAll('.tv-block-content').forEach(el => {
          el.style.fontSize   = sz + 'px';
          el.style.lineHeight = '1.55';
          el.style.whiteSpace = 'pre';
        });
        b.querySelectorAll('.tv-block-label').forEach(el => {
          el.style.fontSize   = (sz * 1.7) + 'px';
          el.style.lineHeight = '1.2';
          el.style.whiteSpace = 'nowrap';
        });
        b.querySelectorAll('.tv-target-label, .tv-target-val').forEach(el => el.style.fontSize = sz + 'px');
      });
    };

    /* Un seul reflow groupé après applySize */
    const fits = sz => {
      applySize(sz);
      void overlay.offsetHeight; /* reflow unique */
      for(const b of blocks){
        const cs  = getComputedStyle(b);
        const avW = b.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
        if(b.scrollHeight > b.clientHeight + 1) return false;
        for(const el of b.querySelectorAll('.tv-block-content, .tv-block-label')){
          if(el.scrollWidth > avW + 1) return false;
        }
      }
      return true;
    };

    /* Phase 1 : vérification rapide autour du cache (±40%) — évite la recherche complète */
    const cached = _tvLastSz;
    let lo, hi;
    if(fits(cached)){
      /* La taille cache convient — chercher si on peut monter */
      lo = cached; hi = Math.min(cached * 1.25, 42);
    } else {
      /* Trop grand — chercher en dessous */
      lo = 4; hi = cached;
    }

    /* Phase 2 : recherche binaire dans la fenêtre réduite */
    let best = fits(lo) ? lo : 4;
    while(hi - lo > 0.5){
      const mid = (lo + hi) / 2;
      if(fits(mid)){ best = mid; lo = mid + 0.5; }
      else          { hi  = mid - 0.5; }
    }

    _tvLastSz = best;
    applySize(best * 0.95);
  });
}


/* ════════════════════════════════════════
   GÉNÉRATION STORY INSTAGRAM
════════════════════════════════════════ */
async function generateInstaStory(){
  const W=1080, H=1920;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  /* ── Attendre que les polices soient prêtes ── */
  await document.fonts.ready;

  /* ── Fond sombre ── */
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(0,0,W,H);

  /* Grain subtil via imageData noise */
  const id=ctx.getImageData(0,0,W,H);
  for(let i=0;i<id.data.length;i+=4){
    const n=(Math.random()-.5)*18;
    id.data[i]+=n; id.data[i+1]+=n; id.data[i+2]+=n;
  }
  ctx.putImageData(id,0,0);

  /* Vignette radiale */
  const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.82);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  /* ── Helpers ── */
  const CF='#E24B4A', HX='#EF9F27', WHITE='#f0eeea', DIM='rgba(240,238,234,.45)';
  function rr(x,y,w,h,r,fill,stroke,sw){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    if(fill){ ctx.fillStyle=fill; ctx.fill(); }
    if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw||3; ctx.stroke(); }
  }
  function stripMd(s){ return (s||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/__([^_]+)__/g,'$1').replace(/_([^_]+)_/g,'$1').replace(/~~([^~]+)~~/g,'$1').replace(/\[([^\]]+)\]/g,'$1').replace(/•\s?/g,'').trim(); }
  function firstLine(s){ return stripMd((s||'').split('\n')[0]).toUpperCase(); }
  function fitText(txt,font,maxW){
    let sz=parseInt(font); const base=font.replace(/^\d+/,'');
    while(sz>16){ ctx.font=sz+base; if(ctx.measureText(txt).width<=maxW) break; sz-=2; }
    return sz+base;
  }

  /* ── Données de la semaine ── */
  const mon=getMonday(S.weekOffset);
  const MOIS_FR=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const JOURS_FR=['LUN','MAR','MER','JEU','VEN','SAM'];
  const days=[];
  for(let i=0;i<6;i++){
    const d=new Date(mon); d.setDate(d.getDate()+i);
    const k=dateKey(d);
    const cf=allSessions.crossfit[k]||{};
    const hx=allSessions.hyrox[k]||{};
    const cfS=(cf.sessions&&cf.sessions[0])||{};
    const hxS=(hx.sessions&&hx.sessions[0])||{};
    days.push({d,k,dayN:d.getDate(),dayLabel:JOURS_FR[i],cfRest:!!cf.rest,hxRest:!!hx.rest,cfType:(cfS.forceType||'').toUpperCase(),cfForce:firstLine(cfS.force),hxType:(hxS.forceType||'').toUpperCase(),hxForce:firstLine(hxS.force)});
  }
  const weekLabel=`SEMAINE DU ${days[0].d.getDate()} AU ${days[5].d.getDate()} ${MOIS_FR[days[0].d.getMonth()].toUpperCase()}`;

  /* ════ LOGO + HEADER TITLE (côte à côte) ════ */
  const margin=52, logoSize=190, logoGap=22;
  const logoX=W-margin-logoSize, logoY=62;
  const hdrX=margin, hdrY=logoY, hdrW=logoX-margin-logoGap, hdrH=logoSize, hdrR=22;

  /* Header box — glow border cyan */
  ctx.shadowColor='rgba(100,255,230,.55)'; ctx.shadowBlur=28;
  rr(hdrX,hdrY,hdrW,hdrH,hdrR,null,'rgba(100,255,230,.85)',4);
  ctx.shadowBlur=0;
  rr(hdrX+3,hdrY+3,hdrW-6,hdrH-6,hdrR-2,'rgba(0,0,0,.6)',null);
  /* Title text — 1 ligne, taille maximale */
  ctx.fillStyle=WHITE; ctx.textAlign='center'; ctx.textBaseline='middle';
  let titleSz=110;
  while(titleSz>20){ ctx.font='bold '+titleSz+'px "Oswald",sans-serif'; if(ctx.measureText('NEW TRAINING WEEK').width<=hdrW-48) break; titleSz-=1; }
  ctx.fillText('NEW TRAINING WEEK',hdrX+hdrW/2,hdrY+hdrH/2);

  /* Logo — cercle à droite, même niveau que le header */
  const logoCx=logoX+logoSize/2, logoCy=logoY+logoSize/2, logoR=logoSize/2;
  if(settings.logoData){
    const img=new Image(); img.src=settings.logoData;
    await new Promise(r=>{img.onload=r;img.onerror=r;});
    ctx.save();
    ctx.beginPath(); ctx.arc(logoCx,logoCy,logoR,0,Math.PI*2); ctx.clip();
    ctx.drawImage(img,logoX,logoY,logoSize,logoSize);
    ctx.restore();
    /* Bordure subtile */
    ctx.beginPath(); ctx.arc(logoCx,logoCy,logoR,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=3; ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(logoCx,logoCy,logoR,0,Math.PI*2);
    ctx.fillStyle='rgba(226,75,74,.18)'; ctx.fill();
    ctx.strokeStyle=CF; ctx.lineWidth=3; ctx.stroke();
    ctx.font='bold 58px "Oswald",sans-serif'; ctx.fillStyle=CF;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PR',logoCx,logoCy);
  }

  /* ════ EN-TÊTES CF / HX ════ */
  const colH=76;
  const colY=hdrY+hdrH+28;
  const numW=100, gap=14, colsX=margin, colsW=(W-margin*2-numW-gap*2)/2;
  const cfColX=colsX+numW+gap, hxColX=cfColX+colsW+gap;
  /* CF label */
  rr(cfColX,colY,colsW,colH,12,null,CF,4);
  let cfHSz=52; while(cfHSz>18){ctx.font='bold '+cfHSz+'px "Oswald",sans-serif';if(ctx.measureText('CROSSFIT').width<=colsW-32)break;cfHSz-=1;}
  ctx.font='bold '+cfHSz+'px "Oswald",sans-serif'; ctx.fillStyle=CF;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('CROSSFIT',cfColX+colsW/2,colY+colH/2);
  /* HX label */
  rr(hxColX,colY,colsW,colH,12,null,HX,4);
  let hxHSz=52; while(hxHSz>18){ctx.font='bold '+hxHSz+'px "Oswald",sans-serif';if(ctx.measureText('HYROX').width<=colsW-32)break;hxHSz-=1;}
  ctx.font='bold '+hxHSz+'px "Oswald",sans-serif'; ctx.fillStyle=HX;
  ctx.fillText('HYROX',hxColX+colsW/2,colY+colH/2);

  /* ════ LIGNES JOURS ════ */
  const rowH=200, rowGap=14;
  const firstRowY=colY+colH+rowGap;

  /* ── Calcul taille police globale (même taille dans toutes les cases) ── */
  function calcSz(txt, maxSz, maxW){
    let sz=maxSz;
    while(sz>16){ ctx.font='bold '+sz+'px "Oswald",sans-serif'; if(ctx.measureText(txt).width<=maxW) break; sz-=1; }
    return sz;
  }
  const boxInner=colsW-40;
  let globalTypeSz=58, globalForceSz=52;
  days.forEach(day=>{
    if(!day.cfRest && day.cfType)  globalTypeSz =Math.min(globalTypeSz, calcSz(day.cfType, globalTypeSz, boxInner));
    if(!day.cfRest && day.cfForce) globalForceSz=Math.min(globalForceSz,calcSz(day.cfForce,globalForceSz,boxInner));
    if(!day.hxRest && day.hxType)  globalTypeSz =Math.min(globalTypeSz, calcSz(day.hxType, globalTypeSz, boxInner));
    if(!day.hxRest && day.hxForce) globalForceSz=Math.min(globalForceSz,calcSz(day.hxForce,globalForceSz,boxInner));
  });
  const typeLineH=globalTypeSz*1.15;

  days.forEach((day,i)=>{
    const y=firstRowY+i*(rowH+rowGap);
    const numRight=(i%2===1); /* alterne gauche/droite */
    const numX=numRight ? W-52-numW : colsX;
    const cfX=numRight ? colsX : colsX+numW+gap;
    const hxX=cfX+colsW+gap;

    /* Carré numéro jour */
    rr(numX,y,numW,rowH,14,'rgba(255,255,255,.06)','rgba(255,255,255,.18)',2);
    ctx.font='bold 80px "Oswald",sans-serif'; ctx.fillStyle=WHITE;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(day.dayN),numX+numW/2,y+rowH/2-14);
    ctx.font='600 26px "Rajdhani",sans-serif'; ctx.fillStyle=DIM;
    ctx.fillText(day.dayLabel,numX+numW/2,y+rowH/2+38);

    /* ── CF box ── */
    const cfGlow=ctx.createLinearGradient(cfX,y,cfX+colsW,y+rowH);
    cfGlow.addColorStop(0,'rgba(226,75,74,.15)'); cfGlow.addColorStop(1,'rgba(226,75,74,.04)');
    rr(cfX,y,colsW,rowH,14,cfGlow,CF,3);
    /* centrage vertical : bloc = ligne type + ligne force */
    const blockH = globalTypeSz + typeLineH;
    const blockTop = y + (rowH - blockH) / 2 + globalTypeSz;

    if(day.cfRest){
      ctx.font='bold '+globalTypeSz+'px "Oswald",sans-serif'; ctx.fillStyle='rgba(226,75,74,.4)';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('CLOSED',cfX+colsW/2,y+rowH/2);
    } else {
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.font='bold '+globalTypeSz+'px "Oswald",sans-serif'; ctx.fillStyle=CF;
      const ftW=ctx.measureText(day.cfType).width;
      ctx.fillText(day.cfType,cfX+colsW/2,blockTop);
      ctx.beginPath(); ctx.moveTo(cfX+colsW/2-ftW/2,blockTop+5); ctx.lineTo(cfX+colsW/2+ftW/2,blockTop+5);
      ctx.strokeStyle=CF; ctx.lineWidth=3; ctx.stroke();
      if(day.cfForce){
        ctx.font='bold '+globalForceSz+'px "Oswald",sans-serif'; ctx.fillStyle=WHITE;
        ctx.fillText(day.cfForce,cfX+colsW/2,blockTop+typeLineH);
      }
    }

    /* ── HX box ── */
    const hxGlow=ctx.createLinearGradient(hxX,y,hxX+colsW,y+rowH);
    hxGlow.addColorStop(0,'rgba(239,159,39,.15)'); hxGlow.addColorStop(1,'rgba(239,159,39,.04)');
    rr(hxX,y,colsW,rowH,14,hxGlow,HX,3);
    if(day.hxRest){
      ctx.font='bold '+globalTypeSz+'px "Oswald",sans-serif'; ctx.fillStyle='rgba(239,159,39,.4)';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('CLOSED',hxX+colsW/2,y+rowH/2);
    } else if(day.hxType==='RUN'){
      /* RUN seul, centré */
      let runSz=globalTypeSz*1.4;
      while(runSz>20){ctx.font='bold '+runSz+'px "Oswald",sans-serif';if(ctx.measureText('RUN').width<=colsW-40)break;runSz-=1;}
      ctx.font='bold '+runSz+'px "Oswald",sans-serif'; ctx.fillStyle=HX;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('RUN',hxX+colsW/2,y+rowH/2);
    } else {
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.font='bold '+globalTypeSz+'px "Oswald",sans-serif'; ctx.fillStyle=HX;
      const htW=ctx.measureText(day.hxType).width;
      ctx.fillText(day.hxType,hxX+colsW/2,blockTop);
      ctx.beginPath(); ctx.moveTo(hxX+colsW/2-htW/2,blockTop+5); ctx.lineTo(hxX+colsW/2+htW/2,blockTop+5);
      ctx.strokeStyle=HX; ctx.lineWidth=3; ctx.stroke();
      if(day.hxForce){
        ctx.font='bold '+globalForceSz+'px "Oswald",sans-serif'; ctx.fillStyle=WHITE;
        ctx.fillText(day.hxForce,hxX+colsW/2,blockTop+typeLineH);
      }
    }
  });

  /* ════ FOOTER ════ */
  const footY=H-90;
  ctx.font='700 28px "Oswald",sans-serif'; ctx.fillStyle='rgba(240,238,234,.25)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText((settings.boxName||'CrossFit Powerful Resilience').toUpperCase()+' — '+weekLabel,W/2,footY);
  /* thin line above */
  ctx.beginPath(); ctx.moveTo(52,footY-22); ctx.lineTo(W-52,footY-22);
  ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; ctx.stroke();

  /* ════ DOWNLOAD ════ */
  const link=document.createElement('a');
  link.download=`story_semaine_${days[0].d.getDate()}-${MOIS_FR[days[0].d.getMonth()]}.jpg`;
  cv.toBlob(blob=>{ link.href=URL.createObjectURL(blob); link.click(); setTimeout(()=>URL.revokeObjectURL(link.href),5000); },'image/jpeg',0.94);
}
